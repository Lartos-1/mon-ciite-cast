<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#0a0a0f;

h1{

button, select{

  border:1px solid #2a2a40;

button:hover, select:hover{

  justify-content:center;

#delay-bar label{

  color:#b0b0cc;
  font-weight:600;
}

#delay-slider{
  -webkit-appearance:none;
  appearance:none;
  width:200px;
  height:6px;
  border-radius:4px;
  background:#2a2a40;
  outline:none;
  cursor:pointer;
  border:none;
  padding:0;
  margin:0;
}

#delay-slider::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#a855f7;
  cursor:pointer;
  box-shadow:0 0 6px rgba(168,85,247,0.7);
}

#delay-slider::-moz-range-thumb{

  height:18px;

  position:absolute;

  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:0;
  background:#000;
  vertical-align:block;
}

.delay-canvas{
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  object-fit:cover;
  z-index:1;

}

#hidden-bar-label{

<body>

<h1>🎥 Cast Stormex</h1>

<p id="myId">
  Mon ID :
  <span id="idValue">loading...</span>
  <button onclick="toggleId()">👁️</button>
</p>

<div>
  <select id="targetSlot">
    <option value="som-slot1">POV 1</option>
    <option value="som-slot2">POV 2</option>
    <option value="som-slot3">POV 3</option>
    <option value="som-slot4">POV 4</option>
    <option value="som-slot5">POV 5</option>
    <option value="som-slot6">POV 6</option>
  </select>
  <button onclick="startShare()">Partager écran</button>
  <button onclick="stopShare()">Stop</button>
</div>

<div id="delay-bar">
  <label for="delay-slider">🕐 Délai :</label>
  <input type="range" id="delay-slider" min="1" max="60" step="0.5" value="5"
         oninput="onDelayChange(this.value)">
  <span id="delay-value">5.0 s</span>
</div>

<p id="hint">
  Flèches ← → : changer de POV &nbsp;|&nbsp; Entrée : plein écran &nbsp;|&nbsp;
  📺 : mettre un live Twitch &nbsp;|&nbsp; Cliquer le drapeau / nom pour modifier
</p>

<div id="videos"></div>

<div id="hidden-bar">
  <div id="hidden-bar-label">POVs masqués — clique pour réafficher</div>
</div>

<div id="global-flag-picker"></div>

<script>
/* ================================================================
   DÉLAI
   ================================================================ */
let DELAY_MS = 5000;
const delaySetups = {};

let sharedAudioCtx = null;
function getSharedAudioCtx(){
  if (!sharedAudioCtx)
    sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (sharedAudioCtx.state === "suspended")
    sharedAudioCtx.resume().catch(() => {});
  return sharedAudioCtx;
}
["click","keydown","touchstart"].forEach(evt =>
  document.addEventListener(evt, () => {
    if (sharedAudioCtx && sharedAudioCtx.state === "suspended")
      sharedAudioCtx.resume().catch(() => {});
  }, { passive:true })
);

function onDelayChange(val){
  DELAY_MS = parseFloat(val) * 1000;
  document.getElementById("delay-value").textContent = parseFloat(val).toFixed(1) + " s";
  Object.values(delaySetups).forEach(s => {
    if (s && s.delayNode) s.delayNode.delayTime.value = DELAY_MS / 1000;
  });
}

function setupDelay(slot, stream){
  const old = delaySetups[slot];
  if (old){
    old.active = false;
    old.frames.forEach(f => { try { f.bitmap.close(); } catch(e){} });
    try { old.source && old.source.disconnect(); } catch(e){}
    try { old.delayNode && old.delayNode.disconnect(); } catch(e){}
    try { old.gainNode && old.gainNode.disconnect(); } catch(e){}
    if (old.canvas) old.canvas.remove();
  }

  const v = videoElements[slot];
  v.muted = true;

  const audioCtx = getSharedAudioCtx();
  const delayNode = audioCtx.createDelay(120);
  delayNode.delayTime.value = DELAY_MS / 1000;
  const gainNode = audioCtx.createGain();
  gainNode.gain.value = 0;

  let source = null;
  if (stream.getAudioTracks().length > 0){
    try {
      source = audioCtx.createMediaStreamSource(stream);
      source.connect(delayNode);
      delayNode.connect(gainNode);
      gainNode.connect(audioCtx.destination);
    } catch(e){ source = null; }
  }

  const container = document.getElementById("container-" + slot);
  const canvas = document.createElement("canvas");
  canvas.className = "delay-canvas";
  container.appendChild(canvas);
  const canvasCtx = canvas.getContext("2d");

  const badge = document.getElementById("badge-" + slot);
  if (badge){
    badge.style.display = "block";
    badge.textContent = "⏳ Buffering " + (DELAY_MS/1000).toFixed(1) + "s...";
  }

  const setup = { ctx:audioCtx, source, gainNode, delayNode, frames:[], active:true, canvas, canvasCtx };
  delaySetups[slot] = setup;

  function captureLoop(){
    if (!setup.active) return;
    if (v.readyState >= 2 && v.videoWidth > 0){
      if (canvas.width !== v.videoWidth){
        canvas.width  = v.videoWidth;
        canvas.height = v.videoHeight;
        canvas.style.display = "block";
      }
      createImageBitmap(v).then(bmp => {
        if (!setup.active){ bmp.close(); return; }
        setup.frames.push({ bitmap:bmp, ts:performance.now() });
        const cutoff = performance.now() - DELAY_MS - 5000;
        while (setup.frames.length > 1 && setup.frames[0].ts < cutoff){
          try { setup.frames[0].bitmap.close(); } catch(e){}
          setup.frames.shift();
        }
      }).catch(() => {});
    }
    setTimeout(captureLoop, 33);
  }

  let bufferingDone = false;
  function displayLoop(){
    if (!setup.active) return;
    const target = performance.now() - DELAY_MS;
    let best = null;
    for (let i = setup.frames.length - 1; i >= 0; i--)
      if (setup.frames[i].ts <= target){ best = setup.frames[i]; break; }
    if (best && canvas.width > 0){
      canvasCtx.drawImage(best.bitmap, 0, 0, canvas.width, canvas.height);
      if (!bufferingDone && badge){ badge.style.display = "none"; bufferingDone = true; }
    }
    requestAnimationFrame(displayLoop);
  }

  captureLoop();
  displayLoop();
}

/* ================================================================
   AUDIO DU JEU — détection automatique du loopback
   ================================================================ */
const LOOPBACK_KEYWORDS = [
  "stereo mix","what u hear","cable output","vb-audio","voicemeeter",
  "blackhole","loopback","virtual audio","soundflower","wave out mix",
  "mixage stéréo","ecoute","wasapi"
];

async function getGameAudioTrack(){
  try {
    const tmp = await navigator.mediaDevices.getUserMedia({ audio:true });
    tmp.getTracks().forEach(t => t.stop());
    const devices = await navigator.mediaDevices.enumerateDevices();
    const loopback = devices.filter(d => d.kind === "audioinput").find(d =>
      LOOPBACK_KEYWORDS.some(kw => d.label.toLowerCase().includes(kw))
    );
    if (loopback){
      const s = await navigator.mediaDevices.getUserMedia({
        audio:{ deviceId:{ exact:loopback.deviceId },
                echoCancellation:false, noiseSuppression:false, autoGainControl:false }
      });
      return s.getAudioTracks()[0] || null;
    }
  } catch(e){}
  return null;
}

async function startShare(){
  getSharedAudioCtx();
  const id = prompt("Peer ID du destinataire :");
  if (!id) return;
  const slot = document.getElementById("targetSlot").value;

  let videoStream;
  try {
    videoStream = await navigator.mediaDevices.getDisplayMedia({
      video:{ displaySurface:"window",
              width:{ideal:1920,max:2560}, height:{ideal:1080,max:1440},
              frameRate:{ideal:30,max:60} },
      audio:{ echoCancellation:false, noiseSuppression:false,
              autoGainControl:false, suppressLocalAudioPlayback:false },
      systemAudio:"exclude"
    });
  } catch(e){ return; }

  let finalStream = videoStream;
  if (videoStream.getAudioTracks().length === 0){
    const gameTrack = await getGameAudioTrack();
    if (gameTrack)
      finalStream = new MediaStream([...videoStream.getVideoTracks(), gameTrack]);
  }

  currentStream = finalStream;
  currentCall   = peer.call(id, finalStream, { metadata:{ slot } });

  const boost = () => {
    try {
      const pc = currentCall.peerConnection; if (!pc) return;
      const sender = pc.getSenders().find(s => s.track?.kind === "video");
      if (sender){
        const p = sender.getParameters();
        if (!p.encodings) p.encodings = [{}];
        p.encodings[0].maxBitrate = 8_000_000;
        sender.setParameters(p).catch(() => {});
      }
    } catch(e){}
  };
  let n = 0;
  const iv = setInterval(() => { boost(); if (++n > 10) clearInterval(iv); }, 500);
}

function stopShare(){
  currentStream?.getTracks().forEach(t => t.stop()); currentStream = null;
  currentCall?.close(); currentCall = null;
}

/* ================================================================
   TWITCH LIVE
   ================================================================ */
const twitchChannels = {}; // slot → channel name ou null
const twitchMuted   = {}; // slot → boolean

function parseTwitchChannel(input){
  // Accepte "nomchain", "twitch.tv/nomchain", "https://www.twitch.tv/nomchain"
  const m = input.trim().match(/(?:twitch\.tv\/)?([A-Za-z0-9_]{3,25})(?:\/.*)?$/);
  return m ? m[1].toLowerCase() : null;
}

function buildTwitchUrl(channel, muted){
  // Le parent doit correspondre au domaine où la page est servie.
  // - localhost : python -m http.server, Live Server, etc.
  // - file://   : on essaie quand même localhost (Twitch le refuse, mais
  //               on affiche une note utile).
  const host = window.location.hostname || "localhost";
  const params = new URLSearchParams({
    channel,
    parent: host,
    autoplay: "true",
    muted: muted ? "true" : "false"
  });
  return `https://player.twitch.tv/?${params}`;
}

function setTwitchStream(slot){
  const input = prompt(
    "Nom du channel Twitch ou URL du live :\n(ex: nomdustream  ou  https://www.twitch.tv/nomdustream)"
  );
  if (!input) return;

  const channel = parseTwitchChannel(input);
  if (!channel){ alert("Channel Twitch invalide."); return; }

  twitchChannels[slot] = channel;
  if (!(slot in twitchMuted)) twitchMuted[slot] = false;

  // Coupe le WebRTC existant pour ce slot si présent
  const old = delaySetups[slot];
  if (old){
    old.active = false;
    old.frames.forEach(f => { try { f.bitmap.close(); } catch(e){} });
    try { old.source && old.source.disconnect(); } catch(e){}
    try { old.delayNode && old.delayNode.disconnect(); } catch(e){}
    try { old.gainNode && old.gainNode.disconnect(); } catch(e){}
    if (old.canvas) old.canvas.remove();
    delete delaySetups[slot];
  }
  const v = videoElements[slot];
  v.srcObject = null;
  v.style.display = "none";

  _renderTwitchFrame(slot);

  // Bouton Twitch → rouge/live
  const btn = document.getElementById("twitchbtn-" + slot);
  if (btn){ btn.textContent = "📺✕"; btn.classList.add("is-live"); btn.title = "Retirer le live Twitch"; }

  // Synchro bouton son
  _syncMuteBtn(slot);
  updateAudioFocus();
}

function _renderTwitchFrame(slot){
  // Retire l'ancien iframe si présent
  const old = document.getElementById("twitch-" + slot);
  if (old) old.remove();

  const container = document.getElementById("container-" + slot);
  const iframe = document.createElement("iframe");
  iframe.id = "twitch-" + slot;
  iframe.className = "twitch-frame";
  iframe.src = buildTwitchUrl(twitchChannels[slot], twitchMuted[slot]);
  iframe.allowFullscreen = true;
  iframe.allow = "autoplay; fullscreen";
  container.appendChild(iframe);

  // Badge si pas de hostname valide (ouverture file://)
  if (!window.location.hostname){
    const badge = document.getElementById("badge-" + slot);
    if (badge){
      badge.style.display = "block";
      badge.style.fontSize = "11px";
      badge.textContent = "⚠️ Sers le fichier en local pour Twitch (ex: python -m http.server)";
    }
  }
}

function removeTwitchStream(slot){
  const iframe = document.getElementById("twitch-" + slot);
  if (iframe) iframe.remove();
  delete twitchChannels[slot];

  const v = videoElements[slot];
  v.style.display = "";

  const badge = document.getElementById("badge-" + slot);
  if (badge) badge.style.display = "none";

  const btn = document.getElementById("twitchbtn-" + slot);
  if (btn){ btn.textContent = "📺"; btn.classList.remove("is-live"); btn.title = "Mettre un live Twitch"; }

  _syncMuteBtn(slot);
}

function toggleTwitch(slot){
  if (twitchChannels[slot]) removeTwitchStream(slot);
  else setTwitchStream(slot);
}

// Mute/unmute pour un slot Twitch : on recharge l'iframe avec muted=true/false
function toggleTwitchMute(slot){
  twitchMuted[slot] = !twitchMuted[slot];
  _renderTwitchFrame(slot);
  _syncMuteBtn(slot);
}

function _syncMuteBtn(slot){
  const btn = document.getElementById("mutebtn-" + slot);
  if (!btn) return;
  if (twitchChannels[slot]){
    const m = twitchMuted[slot];
    btn.textContent = m ? "🔇" : "🔊";
    btn.classList.toggle("is-muted", m);
  } else {
    const setup = delaySetups[slot];
    const muted = !setup || setup.gainNode.gain.value === 0;
    btn.textContent = muted ? "🔇" : "🔊";
    btn.classList.toggle("is-muted", muted);
  }
}

/* ================================================================
   CONFIG DRAPEAUX
   ================================================================ */
const FLAGS = [
  ["fr","France"],["be","Belgique"],["ch","Suisse"],["ca","Canada"],
  ["ma","Maroc"],["dz","Algérie"],["tn","Tunisie"],["sn","Sénégal"],
  ["ci","Côte d'Ivoire"],["cm","Cameroun"],["gn","Guinée"],["ml","Mali"],
  ["cg","Congo"],["ga","Gabon"],["bf","Burkina Faso"],["tg","Togo"],

function flagUrl(code){ return `https://flagcdn.com/w40/${code}.png`; }

function flagImgTag(code, size=22){
  return `<img src="${flagUrl(code)}" width="${size}" height="${Math.round(size*0.667)}"
               style="object-fit:cover;border-radius:3px;" alt="${code.toUpperCase()}"
               onerror="this.style.display='none'">`;
}

/* ======================== GÉNÉRATION DES POVs ======================== */
const slots = ["som-slot1","som-slot2","som-slot3","som-slot4","som-slot5","som-slot6"];
const videosDiv = document.getElementById("videos");

slots.forEach((slot, i) => {
  const num = i + 1;
  videosDiv.insertAdjacentHTML("beforeend", `
  <div class="player-container" id="container-${slot}">
    <div class="slot-placeholder">
      <span class="ph-icon">📡</span>
      <span class="ph-text">En attente d'un stream…</span>
    </div>
    <video id="${slot}" autoplay playsinline muted></video>
    <div class="buffer-badge" id="badge-${slot}"></div>

    <button class="overlay-btn mute-btn" id="mutebtn-${slot}"
            onclick="onMuteClick('${slot}')" title="Couper le son">🔇</button>
    <button class="overlay-btn twitch-btn" id="twitchbtn-${slot}"
            onclick="toggleTwitch('${slot}')" title="Mettre un live Twitch">📺</button>
    <button class="overlay-btn toggle-eye-btn"
            onclick="togglePOV('${slot}')" title="Masquer ce POV">👁️</button>
    <button class="overlay-btn fullscreen-btn"
            onclick="toggleFullscreen('container-${slot}')" title="Plein écran">⛶</button>

    <div class="bottom-label" id="label-${slot}">
      <button class="flag-btn" id="flagbtn-${slot}"
              onclick="togglePicker('${slot}',event)"
              title="Choisir un drapeau">
        <span class="no-flag" id="flagimg-${slot}">🌐</span>
      </button>
      <div class="name-bar" id="name-${slot}"
           contenteditable="true" spellcheck="false"
           data-slot="${slot}">POV ${num}</div>
    </div>
  </div>`);
});

/* ======================== PEER / WebRTC ======================== */
const peer = new Peer();
const videoElements = {};
slots.forEach(s => { videoElements[s] = document.getElementById(s); });
let currentStream=null, currentCall=null, activeIndex=0;

peer.on("open", id => { document.getElementById("idValue").textContent = id; });

peer.on("call", call => {
  const slot = call.metadata?.slot;
  call.answer();
  call.on("stream", stream => {
    const v = videoElements[slot];
    if (!v) return;
    // Si un live Twitch était en place, on l'enlève
    if (twitchChannels[slot]) removeTwitchStream(slot);
    v.srcObject = stream;
    v.play().catch(() => {});
    setupDelay(slot, stream);
    updateAudioFocus();
  });
});

/* ======================== PICKER DRAPEAU GLOBAL ======================== */
const globalPicker = document.getElementById("global-flag-picker");
let pickerCurrentSlot = null;

function buildPickerContent(slot){
  globalPicker.innerHTML = FLAGS.map(([code, label]) =>
    `<button class="flag-option" onclick="pickFlag('${slot}','${code}')" title="${label}">
       ${flagImgTag(code,28)}<span>${label}</span>
     </button>`
  ).join("") +
  `<button class="reset-flag-btn" onclick="pickFlag('${slot}','')">✕ Retirer le drapeau</button>`;
}

function togglePicker(slot, e){
  e.stopPropagation();
  if (globalPicker.classList.contains("open") && pickerCurrentSlot === slot){
    globalPicker.classList.remove("open"); pickerCurrentSlot = null; return;
  }
  pickerCurrentSlot = slot;
  buildPickerContent(slot);
  const btn  = document.getElementById("flagbtn-" + slot);
  const rect = btn.getBoundingClientRect();
  const pickerH = 320, pickerW = 260;
  let top  = rect.top > pickerH + 8 ? rect.top - pickerH - 8 : rect.bottom + 8;
  let left = Math.max(8, Math.min(rect.left + rect.width/2 - pickerW/2, window.innerWidth - pickerW - 8));
  globalPicker.style.top  = top  + "px";
  globalPicker.style.left = left + "px";
  globalPicker.classList.add("open");
}

function pickFlag(slot, code){
  const imgSpan = document.getElementById("flagimg-" + slot);
  imgSpan.innerHTML = code ? flagImgTag(code, 22) : "🌐";
  localStorage.setItem("flag-" + slot, code);
  globalPicker.classList.remove("open"); pickerCurrentSlot = null;
}

document.addEventListener("click", e => {
  if (!globalPicker.contains(e.target)){
    globalPicker.classList.remove("open"); pickerCurrentSlot = null;
  }
});

/* ====== NOMS ÉDITABLES ====== */
function loadPseudos(){
  slots.forEach((slot, i) => {
    const savedFlag = localStorage.getItem("flag-" + slot);
    const savedName = localStorage.getItem("name-" + slot);
    if (savedFlag !== null) pickFlag(slot, savedFlag);
    if (savedName !== null){
      const bar = document.getElementById("name-" + slot);
      if (bar) bar.textContent = savedName || "POV " + (i+1);
    }
  });
}

document.querySelectorAll(".name-bar").forEach(bar => {
  bar.addEventListener("keydown", e => {
    if (e.key === "Enter"){ e.preventDefault(); bar.blur(); }
    e.stopPropagation();
  });
  bar.addEventListener("blur", () => {
    const slot = bar.dataset.slot;
    const i = slots.indexOf(slot);
    if (!bar.textContent.trim()) bar.textContent = "POV " + (i+1);
    localStorage.setItem("name-" + slot, bar.textContent.trim());
  });
});

loadPseudos();

/* ====== CONTRÔLES AUDIO ====== */
function onMuteClick(slot){
  getSharedAudioCtx();
  if (twitchChannels[slot]) toggleTwitchMute(slot);
  else                       toggleMute(slot);
}

function updateAudioFocus(){
  const activeSlot = slots[activeIndex];
  slots.forEach(s => {
    const isActive = (s === activeSlot);
    // WebRTC : contrôle via GainNode
    const setup = delaySetups[s];
    if (setup) setup.gainNode.gain.value = isActive ? 1 : 0;
    // Twitch : on mute/unmute l'iframe si ce n'est pas le slot actif
    if (twitchChannels[s] && !isActive && !twitchMuted[s]){
      // on ne touche pas au choix utilisateur pour Twitch :
      // Twitch gère son propre audio ; on laisse l'user contrôler
    }
    _syncMuteBtn(s);
  });
}

function toggleMute(slot){
  const setup = delaySetups[slot];
  const btn   = document.getElementById("mutebtn-" + slot);
  if (setup){
    const isMuted = setup.gainNode.gain.value === 0;
    setup.gainNode.gain.value = isMuted ? 1 : 0;
    if (btn){
      btn.textContent = !isMuted ? "🔇" : "🔊";
      btn.classList.toggle("is-muted", !isMuted);
    }
  }
}

function toggleFullscreen(containerId){
  const el = document.getElementById(containerId);
  if (!document.fullscreenElement) el.requestFullscreen().catch(() => {});
  else if (document.fullscreenElement === el) document.exitFullscreen();
  else document.exitFullscreen().then(() => el.requestFullscreen().catch(() => {}));
}

function togglePOV(id){
  const container = document.getElementById("container-" + id);
  const wasActive = (slots[activeIndex] === id);
  container.style.display = "none";
  addHiddenChip(id);
  if (wasActive){
    const nextIdx = nextVisibleIndex(activeIndex, 1);
    if (nextIdx !== activeIndex) activateSlot(nextIdx);
    else updateAudioFocus();
  }
}

function showPOV(id){
  document.getElementById("container-" + id).style.display = "";
  removeHiddenChip(id);
}

function isSlotVisible(slot){
  const c = document.getElementById("container-" + slot);
  return !!c && c.style.display !== "none";
}

function nextVisibleIndex(fromIndex, direction){
  let i = fromIndex;
  for (let step = 0; step < slots.length; step++){
    i = ((i + direction) % slots.length + slots.length) % slots.length;
    if (isSlotVisible(slots[i])) return i;
  }
  return fromIndex;
}

function addHiddenChip(id){
  const bar      = document.getElementById("hidden-bar");
  const nameEl   = document.getElementById("name-" + id);
  const name     = nameEl ? nameEl.textContent.trim() : id;
  const flagCode = localStorage.getItem("flag-" + id) || "";
  const chip     = document.createElement("div");
  chip.className = "hidden-chip"; chip.id = "chip-" + id;
  chip.onclick = () => showPOV(id);
  chip.innerHTML = (flagCode
    ? `<img src="https://flagcdn.com/w40/${flagCode}.png" width="18" height="12"
            style="object-fit:cover;border-radius:2px;" alt="">`
    : "") + `<span>👁️ ${name}</span>`;
  bar.appendChild(chip);
  bar.style.display = "flex";
}

function removeHiddenChip(id){
  document.getElementById("chip-" + id)?.remove();
  const bar = document.getElementById("hidden-bar");
  if (!bar.querySelector(".hidden-chip")) bar.style.display = "none";
}

function toggleId(){
  const el = document.getElementById("idValue");
  el.style.display = el.style.display === "none" ? "inline" : "none";
}

/* ====== NAVIGATION POV ====== */
function activateSlot(index){
  const idx  = ((index % slots.length) + slots.length) % slots.length;
  const slot = slots[idx];
  if (!isSlotVisible(slot)) return;
  activeIndex = idx;
  document.querySelectorAll(".player-container").forEach(c => c.classList.remove("active"));
  const container = document.getElementById("container-" + slot);
  if (!container) return;
  container.classList.add("active");
  container.scrollIntoView({ behavior:"smooth", block:"center" });
  if (document.fullscreenElement && document.fullscreenElement !== container)
    document.exitFullscreen().then(() => container.requestFullscreen().catch(() => {}));
  updateAudioFocus();
}

document.addEventListener("keydown", e => {
  if (document.activeElement?.classList.contains("name-bar")) return;
  const numMap = {"1":0,"2":1,"3":2,"4":3,"5":4,"6":5};
  if (numMap[e.key] !== undefined){ activateSlot(numMap[e.key]); return; }
  switch(e.key){
    case "ArrowRight": case "ArrowDown": e.preventDefault(); activateSlot(nextVisibleIndex(activeIndex, 1));  break;
    case "ArrowLeft":  case "ArrowUp":   e.preventDefault(); activateSlot(nextVisibleIndex(activeIndex,-1)); break;
    case "Enter":  e.preventDefault(); toggleFullscreen("container-"+slots[activeIndex]); break;
    case "Escape": if (document.fullscreenElement) document.exitFullscreen(); break;
  }
});

activateSlot(0);
</script>
