<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Cast Stormex - Optimisé</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
}

.player-container {
  display: inline-block;
  margin: 10px;
  background: #1c1c1c;
  padding: 8px;
  border-radius: 10px;
  width: 320px;
  contain: layout paint style;
}

video {
  width: 100%;
  border-radius: 8px;
  background: black;
  will-change: transform;
  transform: translateZ(0);
}

.controls-bottom button {
  margin: 2px;
}

.hide-emojis .toggle-eye-btn {
  display: none;
}
</style>
</head>

<body>

<h1>🎥 Cast Stormex (Optimisé)</h1>

<p>
Mon ID : <span id="idValue">...</span>
<button onclick="toggleId()">👁️</button>
</p>

<button id="toggleEmojisBtn">👁️‍🗨️</button>

<div>
<select id="targetSlot">
  <option value="som-fela">SOM FELA</option>
  <option value="som-natoky">SOM NATOKY</option>
  <option value="som-bema">SOM BEMA</option>
  <option value="som-denzox">SOM DENZOX</option>
  <option value="som-noxy">SOM NOXY</option>
  <option value="som-swezyx">SOM SWEZYX</option>
</select>

<button onclick="startShare()">Partager écran</button>
<button onclick="stopShare()">Stop</button>
</div>

<hr>

<div id="videos">

<!-- FELA -->
<div class="player-container" id="container-som-fela">
<button onclick="togglePOV('som-fela')">👁️</button>
<video id="som-fela" autoplay playsinline></video>
<button onclick="toggleMute('som-fela', this)">🔇</button>
</div>

<!-- NATOKY -->
<div class="player-container" id="container-som-natoky">
<button onclick="togglePOV('som-natoky')">👁️</button>
<video id="som-natoky" autoplay playsinline></video>
<button onclick="toggleMute('som-natoky', this)">🔇</button>
</div>

<!-- BEMA -->
<div class="player-container" id="container-som-bema">
<button onclick="togglePOV('som-bema')">👁️</button>
<video id="som-bema" autoplay playsinline></video>
<button onclick="toggleMute('som-bema', this)">🔇</button>
</div>

<!-- DENZOX -->
<div class="player-container" id="container-som-denzox">
<button onclick="togglePOV('som-denzox')">👁️</button>
<video id="som-denzox" autoplay playsinline></video>
<button onclick="toggleMute('som-denzox', this)">🔇</button>
</div>

<!-- NOXY -->
<div class="player-container" id="container-som-noxy">
<button onclick="togglePOV('som-noxy')">👁️</button>
<video id="som-noxy" autoplay playsinline></video>
<button onclick="toggleMute('som-noxy', this)">🔇</button>
</div>

<!-- SWEZYX -->
<div class="player-container" id="container-som-swezyx">
<button onclick="togglePOV('som-swezyx')">👁️</button>
<video id="som-swezyx" autoplay playsinline></video>
<button onclick="toggleMute('som-swezyx', this)">🔇</button>
</div>

</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script>
/* 🔥 PEER OPTIMISÉ */
const peer = new Peer(undefined, {
  config: {
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" }
    ]
  }
});

const videos = {
  'som-fela': document.getElementById('som-fela'),
  'som-natoky': document.getElementById('som-natoky'),
  'som-bema': document.getElementById('som-bema'),
  'som-denzox': document.getElementById('som-denzox'),
  'som-noxy': document.getElementById('som-noxy'),
  'som-swezyx': document.getElementById('som-swezyx')
};

let stream = null;
let call = null;

/* ID */
peer.on('open', id => {
  document.getElementById('idValue').textContent = id;
});

/* RECEIVE STREAM */
peer.on('call', call => {
  const slot = call.metadata?.slot;

  call.answer();

  call.on('stream', remoteStream => {
    const v = videos[slot];
    if (!v) return;

    v.srcObject = remoteStream;
    v.playsInline = true;

    v.onloadedmetadata = () => {
      v.play().catch(()=>{});
    };
  });
});

/* SHARE SCREEN */
async function startShare() {
  const target = prompt("ID viewer ?");
  const slot = document.getElementById("targetSlot").value;

  if (!target) return;

  stream = await navigator.mediaDevices.getDisplayMedia({
    video: {
      frameRate: 30,
      width: 1280,
      height: 720
    },
    audio: true
  });

  call = peer.call(target, stream, { metadata: { slot } });

  setTimeout(() => setBitrate(call, 2500), 1000);
}

/* STOP */
function stopShare() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (call) call.close();
}

/* BITRATE FIX */
function setBitrate(call, kbps) {
  if (!call?.peerConnection) return;

  call.peerConnection.getSenders().forEach(sender => {
    if (!sender.track) return;

    const params = sender.getParameters();
    if (!params.encodings) params.encodings = [{}];

    if (sender.track.kind === "video") {
      params.encodings[0].maxBitrate = kbps * 1000;
      params.encodings[0].maxFramerate = 30;
    }

    sender.setParameters(params).catch(()=>{});
  });
}

/* MUTE FIX */
function toggleMute(id, btn) {
  const v = document.getElementById(id);
  v.muted = !v.muted;
  v.volume = v.muted ? 0 : 1;
  btn.textContent = v.muted ? "🔇" : "🔊";
}

/* TOGGLE SLOT */
function togglePOV(id) {
  const el = document.getElementById("container-" + id);
  el.style.display = (el.style.display === "none") ? "inline-block" : "none";
}

/* UI */
function toggleId() {
  const el = document.getElementById("idValue");
  el.style.display = (el.style.display === "none") ? "inline" : "none";
}

document.getElementById("toggleEmojisBtn").onclick = () => {
  document.body.classList.toggle("hide-emojis");
};

/* 🔥 PERF BOOST : pause vidéos hors écran */
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    const v = e.target.querySelector("video");
    if (!v) return;

    if (e.isIntersecting) v.play().catch(()=>{});
    else v.pause();
  });
});

document.querySelectorAll(".player-container").forEach(el => {
  observer.observe(el);
});
</script>

</body>
</html>
