<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cast Stormex</title>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0a0a0f;
color:white;
text-align:center;
}

h1{
margin-top:18px;
font-size:22px;
font-weight:800;
color:#a855f7;
text-shadow:0 0 12px rgba(168,85,247,0.7);
}

#myId{
display:inline-block;
background:#141422;
padding:8px 14px;
border-radius:10px;
border:1px solid #2a2a40;
margin-bottom:10px;
}

button, select{
padding:10px 12px;
margin:5px;
border-radius:10px;
border:1px solid #2a2a40;
background:#151524;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover, select:hover{
border-color:#a855f7;
background:#1f1f35;
}

label{
display:inline-block;
margin:5px;
padding:6px 10px;
border-radius:8px;
background:#141422;
border:1px solid #2a2a40;
}

#videos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:15px;
padding:20px;
}

.player-container{
background:#12121c;
border-radius:16px;
padding:10px;
position:relative;
border:1px solid #24243a;
transition:0.2s;
}

.player-container.active{
border:2px solid #a855f7;
box-shadow:0 0 20px rgba(168,85,247,0.5);
transform:scale(1.02);
}

video{
width:100%;
border-radius:12px;
background:black;
}

.info-bar{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.75);
padding:4px 10px;
border-radius:8px;
font-size:12px;
border:1px solid #a855f7;
}

.controls-bottom{
margin-top:8px;
display:flex;
justify-content:center;
gap:10px;
}

.control-button{
background:#151524;
border:1px solid #2a2a40;
border-radius:8px;
padding:6px 10px;
}

.toggle-eye-btn{
position:absolute;
top:8px;
right:8px;
background:#151524;
border:1px solid #2a2a40;
border-radius:8px;
padding:4px 8px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🎥 Cast Stormex</h1>

<p id="myId">
Mon ID :
<span id="idValue">loading...</span>
<button onclick="toggleId()">👁️</button>
</p>

<button id="toggleEmojisBtn">👁️‍🗨️</button>

<div>
<select id="targetSlot">
<option value="som-fela">Slot : SOM FELA</option>
<option value="som-natoky">Slot : SOM NATOKY</option>
<option value="som-bema">Slot : SOM BEMA</option>
<option value="som-denzox">Slot : SOM DENZOX</option>
<option value="som-noxy">Slot : SOM NOXY</option>
<option value="som-swezyx">Slot : SOM SWEZYX</option>
</select>

<button onclick="startShare()">Partager</button>
<button onclick="stopShare()">Stop</button>
</div>

<div id="videos">

<div class="player-container" id="container-som-fela"><video id="som-fela" autoplay playsinline></video><div class="info-bar">FELA</div></div>
<div class="player-container" id="container-som-natoky"><video id="som-natoky" autoplay playsinline></video><div class="info-bar">NATOKY</div></div>
<div class="player-container" id="container-som-bema"><video id="som-bema" autoplay playsinline></video><div class="info-bar">BEMA</div></div>
<div class="player-container" id="container-som-denzox"><video id="som-denzox" autoplay playsinline></video><div class="info-bar">DENZOX</div></div>
<div class="player-container" id="container-som-noxy"><video id="som-noxy" autoplay playsinline></video><div class="info-bar">NOXY</div></div>
<div class="player-container" id="container-som-swezyx"><video id="som-swezyx" autoplay playsinline></video><div class="info-bar">SWEZYX</div></div>

</div>

<script>
const peer = new Peer();

const videoElements = {
"som-fela": document.getElementById("som-fela"),
"som-natoky": document.getElementById("som-natoky"),
"som-bema": document.getElementById("som-bema"),
"som-denzox": document.getElementById("som-denzox"),
"som-noxy": document.getElementById("som-noxy"),
"som-swezyx": document.getElementById("som-swezyx")
};

let currentStream=null;
let currentCall=null;

peer.on("open", id=>{
document.getElementById("idValue").textContent=id;
});

peer.on("call", call=>{
const slot=call.metadata?.slot;
call.answer();

call.on("stream", stream=>{
const v=videoElements[slot];
if(!v)return;
v.srcObject=stream;
v.play().catch(()=>{});
});
});

function startShare(){
const id=prompt("Peer ID:");
const slot=document.getElementById("targetSlot").value;

navigator.mediaDevices.getDisplayMedia({video:true,audio:true})
.then(stream=>{
currentStream=stream;
currentCall=peer.call(id,stream,{metadata:{slot}});
});
}

function stopShare(){
if(currentStream){
currentStream.getTracks().forEach(t=>t.stop());
currentStream=null;
}
if(currentCall){
currentCall.close();
currentCall=null;
}
}

function toggleId(){
const el=document.getElementById("idValue");
el.style.display=el.style.display==="none"?"inline":"none";
}

/* 🔥 HOTKEY SYSTEM 1-6 */
document.addEventListener("keydown",(e)=>{
const map={
"1":"som-fela",
"2":"som-natoky",
"3":"som-bema",
"4":"som-denzox",
"5":"som-noxy",
"6":"som-swezyx"
};

const id=map[e.key];
if(!id)return;

document.querySelectorAll(".player-container")
.forEach(c=>c.classList.remove("active"));

const container=document.getElementById("container-"+id);
if(container){
container.classList.add("active");
container.scrollIntoView({behavior:"smooth",block:"center"});
}
});
</script>

</body>
</html>
