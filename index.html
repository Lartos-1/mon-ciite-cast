<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Stormex Cast</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: sans-serif;
      margin: 0;
      padding: 0;
    }
    .player-container {
      position: relative;
      display: inline-block;
      margin: 10px;
      width: 320px;
      height: 180px;
      border: 3px solid #6a2c8a;
      border-radius: 8px;
      overflow: hidden;
      background: black;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: black;
      border-radius: 8px;
    }
    .info-bar {
      position: absolute;
      bottom: 3px;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      font-size: 11px;
      font-weight: normal;
      border-radius: 0 0 6px 6px;
      overflow: hidden;
      user-select: none;
      pointer-events: none;
      z-index: 10;
      color: #ddd;
      background: rgba(0,0,0,0.5);
      padding: 4px 8px;
    }
    .info-bar-top {
      background: #6a2c8a;
      color: white;
      display: flex;
      align-items: center;
      padding: 3px 8px;
      gap: 5px;
      font-weight: bold;
      height: 22px;
      border-radius: 6px 6px 0 0;
    }
    .info-bar-top img {
      width: 16px;
      height: 10px;
      border-radius: 2px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .controls-bottom {
      position: absolute;
      bottom: 5px;
      right: 5px;
      display: flex;
      gap: 8px;
      pointer-events: auto;
      z-index: 20;
    }
    .control-button {
      background: rgba(0, 0, 0, 0.6);
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .control-button:focus { outline: none; }
    #toggleEmojisBtn {
      font-size: 24px;
      margin: 10px;
      cursor: pointer;
      background: none;
      border: none;
      color: white;
      user-select: none;
    }
    .hide-emojis *:not(.player-container):not(.player-container *) {
      visibility: hidden !important;
    }
    .player-container, .player-container * {
      visibility: visible !important;
    }
    .hide { display: none; }
    .toggle-eye-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(106, 44, 138, 0.8);
      border: none;
      color: white;
      font-size: 18px;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      cursor: pointer;
      z-index: 30;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
  <h1>🎥 Cast Stormex</h1>

  <p id="myId">Mon ID de stream : <span id="idValue">...</span>
    <button onclick="toggleId()">👁️</button>
  </p>

  <button id="toggleEmojisBtn">👁️‍🗨️</button>

  <div>
    <select id="targetSlot">
      <option value="som-fela">Slot : SOM FELA</option>
      <option value="som-natoky">Slot : SOM NATOKY</option>
      <option value="som-bema">Slot : SOM BEMA</option>
      <option value="som-denzox">Slot : SOM DENZOX</option>
      <option value="som-noxy">Slot : SOM NOXY</option>
      <option value="som-swezyx">Slot : SOM SWEZYX</option>
    </select>
    <button onclick="startShare()">Partager mon écran</button>
    <button onclick="stopShare()">Arrêter le partage</button>
  </div>

  <div>
    <label><input type="checkbox" checked onchange="togglePOV('som-fela')"> SOM FELA</label>
    <label><input type="checkbox" checked onchange="togglePOV('som-natoky')"> SOM NATOKY</label>
    <label><input type="checkbox" checked onchange="togglePOV('som-bema')"> SOM BEMA</label>
    <label><input type="checkbox" checked onchange="togglePOV('som-denzox')"> SOM DENZOX</label>
    <label><input type="checkbox" checked onchange="togglePOV('som-noxy')"> SOM NOXY</label>
    <label><input type="checkbox" checked onchange="togglePOV('som-swezyx')"> SOM SWEZYX</label>
  </div>

  <div id="videos">
    <!-- POVs similaires au script précédent avec drapeaux -->
    <div class="player-container" id="container-som-fela">
      <button class="toggle-eye-btn" onclick="togglePOV('som-fela')">👁️</button>
      <video id="som-fela" autoplay playsinline></video>
      <div class="info-bar"><div class="info-bar-top"><img src="https://flagcdn.com/w20/fr.png"><span>SOM FELA</span></div></div>
      <div class="controls-bottom">
        <button class="control-button" onclick="toggleMute('som-fela')">🔇</button>
        <button class="control-button" onclick="toggleFullscreen('container-som-fela')">⬜</button>
      </div>
    </div>

    <div class="player-container" id="container-som-denzox">
      <button class="toggle-eye-btn" onclick="togglePOV('som-denzox')">👁️</button>
      <video id="som-denzox" autoplay playsinline></video>
      <div class="info-bar"><div class="info-bar-top"><img src="https://flagcdn.com/w20/ch.png"><span>SOM DENZOX</span></div></div>
      <div class="controls-bottom">
        <button class="control-button" onclick="toggleMute('som-denzox')">🔇</button>
        <button class="control-button" onclick="toggleFullscreen('container-som-denzox')">⬜</button>
      </div>
    </div>

    <!-- Ajouter les autres POVs de la même manière (natoky, bema, noxy, swezyx) -->
  </div>

  <script>
    const peer = new Peer();
    const videoElements = {
      'som-fela': document.getElementById('som-fela'),
      'som-natoky': document.getElementById('som-natoky'),
      'som-bema': document.getElementById('som-bema'),
      'som-denzox': document.getElementById('som-denzox'),
      'som-noxy': document.getElementById('som-noxy'),
      'som-swezyx': document.getElementById('som-swezyx')
    };
    let currentStream = null;
    let currentCall = null;

    peer.on('open', id => {
      document.getElementById('idValue').textContent = id;
    });

    peer.on('call', call => {
      const slot = call.metadata?.slot;
      call.answer();
      call.on('stream', stream => {
        const vid = videoElements[slot];
        if (!vid) return;
        vid.srcObject = stream;
        vid.playsInline = true;
        vid.muted = false;
        vid.volume = 1;
        vid.addEventListener('loadedmetadata', () => vid.play().catch(()=>{}));
      });
    });

    function startShare() {
      const targetId = prompt("Entre l'ID PeerJS du viewer :");
      const slot = document.getElementById('targetSlot').value;
      if (!targetId || !slot) return;
      navigator.mediaDevices.getDisplayMedia({
        video: { width: 1280, height: 720, frameRate: { ideal: 60, max: 60 } },
        audio: true
      }).then(stream => {
        currentStream = stream;
        currentCall = peer.call(targetId, stream, { metadata: { slot } });
        setTimeout(() => setMaxBitrate(currentCall, 5000), 1000);
      });
    }

    function stopShare() {
      if (currentStream) currentStream.getTracks().forEach(t => t.stop());
      if (currentCall) { currentCall.close(); currentCall = null; }
      currentStream = null;
    }

    function toggleMute(id) {
      const v = videoElements[id];
      if (!v) return;
      v.muted = !v.muted;
      const btn = v.parentElement.querySelector('.control-button');
      btn.textContent = v.muted ? '🔇' : '🔊';
    }

    function toggleFullscreen(id) {
      const c = document.getElementById(id);
      if (!c) return;
      document.fullscreenElement ? document.exitFullscreen() : c.requestFullscreen();
    }

    function toggleId() {
      const el = document.getElementById('idValue');
      el.style.display = el.style.display === 'none' ? 'inline' : 'none';
    }

    document.getElementById('toggleEmojisBtn').addEventListener('click', () => {
      document.body.classList.toggle('hide-emojis');
    });

    function togglePOV(id) {
      const container = document.getElementById('container-' + id);
      if (!container) return;
      container.style.display = container.style.display === 'none' ? 'inline-block' : 'none';
      document.querySelectorAll("input[type=checkbox]").forEach(chk => {
        if (chk.nextSibling.textContent.toLowerCase().includes(id)) chk.checked = container.style.display !== 'none';
      });
    }

    function setMaxBitrate(call, kbps) {
      if (!call?.peerConnection) return;
      call.peerConnection.getSenders().forEach(sender => {
        if (!sender.track) return;
        const params = sender.getParameters();
        if (!params.encodings) params.encodings = [{}];
        params.encodings[0].maxBitrate = (sender.track.kind === "video" ? kbps : 128) * 1000;
        sender.setParameters(params).catch(()=>{});
      });
    }
  </script>
</body>
</html>
