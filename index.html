<style>
.player-container{
    background:#12121c;
    border-radius:16px;
    padding:10px;
    position:relative;
    border:1px solid #24243a;
    transition:.2s;
}

.player-container.active{
    border:2px solid #a855f7;
    box-shadow:0 0 20px rgba(168,85,247,.5);
    transform:scale(1.02);
}

video{
    width:100%;
    border-radius:12px;
    background:black;
}

.pov-name{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:30px;
    font-weight:700;
    color:white;
    background:rgba(0,0,0,.45);
    padding:10px 22px;
    border-radius:12px;
    border:2px solid rgba(255,255,255,.2);
    text-shadow:0 0 10px #000;
    pointer-events:none;
}
</style>

<div id="videos">
<div class="player-container" id="container-som-fela">
    <button class="toggle-eye-btn" onclick="togglePOV('som-fela')">👁️</button>
    <video id="som-fela" autoplay playsinline></video>
    <div class="pov-name">POV 1</div>
    <div class="controls-bottom">
        <button class="control-button" onclick="toggleMute('som-fela')">🔊</button>
        <button class="control-button" onclick="toggleFullscreen('container-som-fela')">⬜</button>
    </div>
</div>
